services:
  db:
    image: postgres:16-alpine
    container_name: myraba-fintech-db-1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: myraba_db
      POSTGRES_USER: vingo
      POSTGRES_PASSWORD: vingo2025
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vingo -d myraba_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
