server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.web: ${LOG_LEVEL_WEB:WARN}
    # --- JWT Configuration ---
jwt:
  secret: ${JWT_SECRET:ThisIsAMyrabaFintechSuperSecretKeyForJWT2025!!SecureEnough}
  expiration: ${JWT_EXPIRATION:86400000}

# AES-256 key (32 bytes Base64-encoded) — MUST be overridden via env var in production
encryption:
  key: ${ENCRYPTION_KEY:MyrabaDefaultEncKeyMustChange2025==}

# --- Spring Configuration ---
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://db:5432/myraba_db}
    username: ${DATABASE_USER:vingo}
    password: ${DATABASE_PASSWORD:vingo2025}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:false}
    # Note: I removed the dialect line here because your logs showed a 
    # warning saying Hibernate 6 detects it automatically now!
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:465}
    username: ${MYRABA_MAIL_USERNAME:resend}
    password: ${MYRABA_MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# ─── External API keys (override via env vars in production) ───────
myraba:
  flutterwave:
    secret-key: ${FLUTTERWAVE_SECRET_KEY:FLWSECK_TEST-changeme}
    public-key: ${FLUTTERWAVE_PUBLIC_KEY:FLWPUBK_TEST-changeme}
    base-url: https://api.flutterwave.com/v3
  vtpass:
    api-key: ${VTPASS_API_KEY:changeme}
    public-key: ${VTPASS_PUBLIC_KEY:changeme}
    secret-key: ${VTPASS_SECRET_KEY:changeme}
    base-url: https://sandbox.vtpass.com/api
  dojah:
    app-id: ${DOJAH_APP_ID:changeme}
    private-key: ${DOJAH_PRIVATE_KEY:changeme}
    base-url: https://sandbox.dojah.io
  termii:
    api-key: ${TERMII_API_KEY:changeme}
    sender-id: ${TERMII_SENDER_ID:Vingo}
    base-url: https://v3.api.termii.com
  aml:
    daily-transfer-limit: ${AML_DAILY_TRANSFER_LIMIT:500000}   # ₦500,000 default
    single-transfer-limit: ${AML_SINGLE_TRANSFER_LIMIT:200000} # ₦200,000 per transaction
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:dkij9xngt}
    api-key: ${CLOUDINARY_API_KEY:855364613774551}
    api-secret: ${CLOUDINARY_API_SECRET:Iln_DRreGEWbmUufJIDw2aCxR7M}