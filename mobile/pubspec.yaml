name: myraba
description: Myraba — Nigerian fintech wallet
publish_to: 'none'
version: 1.2.0+14

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  cupertino_icons: ^1.0.8
  fl_chart: ^0.70.2
  uuid: ^4.5.1
  local_auth: ^2.3.0
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

flutter_native_splash:
  color: "#0C0A18"
  color_dark: "#0C0A18"
  # Uncomment and add your logo PNG once you have it:
  # image: assets/icon/splash_logo.png
  android: true
  ios: true
  fullscreen: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0C0A18"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21
